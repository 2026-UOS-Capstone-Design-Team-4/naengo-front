name: fridge_expert
description: A new Flutter project.
version: 1.0.0+1
environment:
  sdk: ^3.9.0
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_svg: ^2.0.12
  cached_network_image: ^3.4.1
  connectivity_plus: ^6.1.0
  gradient_borders: ^1.0.2
  web: any
  universal_html: ^2.2.4
  http: ^1.6.0
  image_picker: ^1.1.2
  kakao_flutter_sdk_user: ^1.9.1
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3
  flutter_native_splash: ^2.4.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/naengo_icon.png"

flutter_native_splash:
  color: "#FF6464"
  image: assets/images/naengo_icon.png
  color_dark: "#FF6464"
  image_dark: assets/images/naengo_icon.png
  android_12:
    color: "#FF6464"
flutter:
  uses-material-design: true
  assets:
    - assets/
    - assets/images/
  fonts:
    - family: Urbanist
      fonts:
        - asset: assets/fonts/UrbanistRomanBold.ttf
          weight: 700
    - family: Inter
      fonts:
        - asset: assets/fonts/InterRegular.ttf
          weight: 400
        - asset: assets/fonts/InterMedium.ttf
          weight: 500
    - family: Noto Sans KR
      fonts:
        - asset: assets/fonts/NotoSansKRMedium.ttf
          weight: 500
    - family: Tmoney RoundWind
      fonts:
        - asset: assets/fonts/TmoneyRoundWind.ttf
          weight: 500
    - family: NanumSquare ac
      fonts:
        - asset: assets/fonts/NanumSquare_ac.ttf
          weight: 500
